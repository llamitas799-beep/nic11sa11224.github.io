<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Table</title>

<style>

table{
border-collapse: collapse;
width:60%;
margin:auto;
}


th{
padding: 10px;
border: 2px solid rgb(7, 6, 6);
font-family: "Poppins", "Montserrat", sans-serif;
}


td{
padding: 10px;
text-align: center;
border: 1px solid rgb(7, 6, 6);
font-family: "Nunito", sans-serif;
}


img{
    display: block;
    margin: auto;
    width: 700px;
    height: 400px;
    padding: 20px;
    border-radius: 30px;
}


</style>


</head>


<body>

<img src="Paisaje.jpg">


<table>

<tr>
<th colspan="5">Colors Of The Beach</th>
</tr>


<tr>
<th>Config</th>
<th style="background-color: rgb(246, 188, 138);">Peach</th>
<th style="background-color: rgb(153, 135, 25);">Olive</th>
<th style="background-color: rgb(104, 119, 140);">Blue Gray</th>
<th style="background-color: rgb(244, 235, 168);">Butter Yellow</th>
</tr>

<tr>
<td><b>Hex</b></td>
<td>#f6bc8a</td>
<td>#998719</td>
<td>#68778c</td>
<td>#f4eba8</td>
</tr>

<tr>
<td><b>RGB</b></td>
<td>246, 188, 138</td>
<td>153, 135, 25</td>
<td>104, 119, 140</td>
<td>244, 235, 168</td>
</tr>

<tr>
<td><b>HSL</b></td>
<td>28°, 86%, 75%</td>
<td>52°, 72%, 35%</td>
<td>215°, 15%, 48%</td>
<td>53°, 78%, 81%</td>
</tr>

</table>



</body>
</html>

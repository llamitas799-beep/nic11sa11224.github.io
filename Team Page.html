<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>



.Fixed-Menu1 {
top:0;
left:0;
position:fixed;
width:25%;
height:40px;
background-color: #2F4156;
border-bottom:2px solid #2F4156;
transition:0.3s;

display:flex;
align-items:center;
gap:5px;
padding-left:5px;
}

.Fixed-Menu2 {
top:0;
left:25%;
position:fixed;
width:25%;
height:40px;
background-color: #567C8D;
margin:0;
border-bottom:2px solid #2F4156;
transition:0.3s;
text-align:center;
display:flex;
align-items:center; 
justify-content:center;
font-family: 'Courier New', Courier, monospace ;
font-size:20px;
color: #2F4156;
}

.Fixed-Menu3 {
top:0;
left:50%;
position:fixed;
width:25%;
height:40px;
background-color: #2F4156;
margin:0;
margin-bottom: 10px;
border-bottom:2px solid #2F4156;
transition:0.3s;
text-align:center;
display:flex;
align-items:center; 
justify-content:center;
font-family: 'Courier New', Courier, monospace ;
font-size:20px;
color: #567C8D;
}

.Fixed-Menu4 {
top:0;
left:75%;
position:fixed;
width:25%;
height:40px;
background-color: #567C8D;
margin:0;
margin-bottom: 10px;
border-bottom:2px solid #2F4156;
transition:0.5s;
text-align:center;
display:flex;
align-items:center; 
justify-content:center;
font-family: 'Courier New', Courier, monospace ;
font-size:20px;
color: #2F4156;
}

[class^="Fixed-Menu"]:hover {
opacity:0.5;
cursor: pointer;
}

input[type="text"] {
margin: 5px;
border-radius:4px;
font-family: 'Courier New', Courier, monospace ;
height:25px;

}

img {
    margin-top: 5px;
}

.pargh {
width:100%;
height:150px;
border: 5px solid #2F4156;
margin-top:42px;
padding-right:10px;
padding-left: 0;
background-color:  #F5EFEB;


display:flex;
align-items: center;
gap: 15px;
}

body {
    margin:0;
    overflow-x:hidden;
}

.square{
width:145px;
height:150px;
background-color: #C8D9E6;
border-right: 5px solid #2F4156; 
flex-shrink: 0;
}

.square img {
width: 95%;
height: 95%;
object-fit: cover;
}



    </style>
</head>


<body>

<div class="Fixed-Menu1">
<img src="glass.png" alt="Search" width="30px" height="30px"; style="float:left">

</div>
